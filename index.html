<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Nashik Municipal Corporation - Print &amp; Pay Kiosk</title>
    <link rel="icon" type="image/png" href="./assets/aarya-innovtech-logo.png" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./responsive.css" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const isElectronKiosk = ["electron", "mini-pc"].includes(params.get("device"));

        window.PRINTING_KIOSK_ELECTRON = isElectronKiosk;
        document.addEventListener("contextmenu", (event) => event.preventDefault());
        document.addEventListener("dragstart", (event) => event.preventDefault());
      })();
    </script>
    <script src="./config.js"></script>
    <script src="./ui-icons.js"></script>
    <script>
      const appScript = document.createElement("script");
      appScript.src = "./app.js";
      document.body.appendChild(appScript);
    </script>
  </body>
</html>
